<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kookboek">
<meta name="theme-color" content="#c8472a">
<title>Mijn Kookboek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,400;1,9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #faf3e7;
    --paper-dark: #f0e6d2;
    --ink: #2a1810;
    --ink-soft: #5a4838;
    --tomato: #c8472a;
    --tomato-dark: #9a3520;
    --olive: #6b7d3a;
    --mustard: #d4a017;
    --cream: #fff8ea;
    --shadow: rgba(42, 24, 16, 0.12);
    --fitness: #e07a3a;
    --wielren: #4a6fa5;
    --rust: #7a9a47;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--paper); color: var(--ink); line-height: 1.6; overflow-x: hidden; }
  body { background-image: radial-gradient(circle at 20% 30%, rgba(212, 160, 23, 0.04) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(200, 71, 42, 0.04) 0%, transparent 50%); min-height: 100vh; }
  .header { padding: 28px 22px 18px; text-align: center; position: relative; }
  .header h1 { font-family: 'Caveat', cursive; font-size: 48px; font-weight: 700; color: var(--tomato); margin: 0; line-height: 1; transform: rotate(-2deg); text-shadow: 1px 1px 0 rgba(0,0,0,0.05); }
  .header .subtitle { font-family: 'Fraunces', serif; font-style: italic; font-size: 14px; color: var(--ink-soft); margin-top: 8px; letter-spacing: 0.3px; }
  .header .underline { width: 80px; height: 3px; background: var(--mustard); margin: 14px auto 0; border-radius: 2px; transform: rotate(-1deg); }
  .nav-section { padding: 0 18px 18px; }
  .nav-label { font-family: 'Caveat', cursive; font-size: 22px; color: var(--ink-soft); margin: 0 0 6px 4px; }
  .pills { display: flex; gap: 8px; overflow-x: auto; padding: 6px 0 10px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .pills::-webkit-scrollbar { display: none; }
  .pill { flex-shrink: 0; padding: 10px 18px; border: 2px solid var(--ink); background: var(--cream); color: var(--ink); border-radius: 50px; font-family: 'Fraunces', serif; font-weight: 600; font-size: 15px; cursor: pointer; transition: all 0.2s ease; white-space: nowrap; }
  .pill:active { transform: scale(0.96); }
  .pill.active { background: var(--ink); color: var(--paper); }
  .pill.day-fitness.active { background: var(--fitness); border-color: var(--fitness); }
  .pill.day-wielren.active { background: var(--wielren); border-color: var(--wielren); }
  .pill.day-rust.active { background: var(--rust); border-color: var(--rust); }
  .recipes { padding: 12px 18px 100px; display: grid; grid-template-columns: 1fr; gap: 16px; }
  .recipe-card { background: var(--cream); border-radius: 20px; cursor: pointer; position: relative; box-shadow: 0 4px 14px var(--shadow); border: 1px solid rgba(42, 24, 16, 0.06); transition: transform 0.2s ease; overflow: hidden; }
  .recipe-card:active { transform: scale(0.98); }
  .recipe-card .card-image { width: 100%; height: 180px; background-color: var(--paper-dark); background-size: cover; background-position: center; position: relative; display: flex; align-items: center; justify-content: center; }
  .recipe-card .card-image::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%, rgba(0,0,0,0.15) 100%); pointer-events: none; }
  .recipe-card .recipe-emoji { font-size: 90px; line-height: 1; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25)); transform: rotate(-4deg); transition: transform 0.3s ease; z-index: 0; }
  .recipe-card:hover .recipe-emoji { transform: rotate(2deg) scale(1.08); }
  .recipe-card .card-image .badge-row { position: absolute; top: 12px; left: 12px; display: flex; gap: 6px; flex-wrap: wrap; z-index: 2; }
  .modal-hero-emoji { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-4deg); font-size: 130px; line-height: 1; filter: drop-shadow(0 6px 18px rgba(0,0,0,0.3)); z-index: 1; }
  .recipe-card .card-body { padding: 16px 20px 18px; position: relative; }
  .recipe-card .card-body::before { content: ''; position: absolute; top: 0; left: 0; width: 5px; height: 100%; background: var(--tomato); }
  .recipe-card.type-ontbijt .card-body::before { background: var(--mustard); }
  .recipe-card.type-snack .card-body::before { background: var(--olive); }
  .recipe-card.type-lunch .card-body::before { background: var(--tomato); }
  .recipe-card.type-diner .card-body::before { background: var(--tomato-dark); }
  .meta-tag { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; padding: 4px 10px; border-radius: 20px; background: rgba(255,255,255,0.95); color: var(--ink); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
  .meta-tag.fitness { background: var(--fitness); color: white; }
  .meta-tag.wielren { background: var(--wielren); color: white; }
  .meta-tag.rust { background: var(--rust); color: white; }
  .recipe-card h3 { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: var(--ink); margin: 4px 0 6px; line-height: 1.2; }
  .recipe-card .desc { font-size: 14px; color: var(--ink-soft); margin: 0; line-height: 1.5; }
  .recipe-card .footer { margin-top: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--ink-soft); font-style: italic; }
  .recipe-card .footer .time { font-family: 'Caveat', cursive; font-size: 18px; color: var(--tomato); font-style: normal; }
  .add-btn { position: fixed; bottom: 24px; right: 22px; width: 60px; height: 60px; border-radius: 50%; background: var(--tomato); color: white; border: none; font-size: 32px; font-weight: 300; box-shadow: 0 6px 20px rgba(200, 71, 42, 0.4); cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center; transition: transform 0.2s ease; }
  .add-btn:active { transform: scale(0.92); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(42, 24, 16, 0.5); z-index: 200; display: none; align-items: flex-end; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
  .modal-overlay.active { display: flex; opacity: 1; }
  .modal { background: var(--paper); width: 100%; max-width: 600px; max-height: 92vh; border-radius: 24px 24px 0 0; padding: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1); position: relative; }
  .modal-overlay.active .modal { transform: translateY(0); }
  .modal-hero { width: 100%; height: 240px; background-color: var(--paper-dark); background-size: cover; background-position: center; position: relative; border-radius: 24px 24px 0 0; }
  .modal-hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, transparent 30%, transparent 60%, rgba(0,0,0,0.4) 100%); border-radius: 24px 24px 0 0; }
  .modal-handle { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 40px; height: 4px; background: white; opacity: 0.7; border-radius: 4px; z-index: 2; }
  .modal-close { position: absolute; top: 14px; right: 14px; width: 36px; height: 36px; background: rgba(255,255,255,0.95); border: 1px solid rgba(42, 24, 16, 0.1); border-radius: 50%; font-size: 18px; cursor: pointer; color: var(--ink); display: flex; align-items: center; justify-content: center; z-index: 3; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
  .modal-hero-content { position: absolute; bottom: 16px; left: 22px; right: 22px; z-index: 2; color: white; }
  .modal-hero .badge-row { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .modal h2 { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 700; margin: 0; line-height: 1.15; color: white; text-shadow: 0 2px 8px rgba(0,0,0,0.4); }
  .modal .modal-meta { font-family: 'Caveat', cursive; font-size: 20px; color: var(--tomato); margin: 18px 24px 0; }
  .modal-content { padding: 0 24px 30px; }
  .modal section { margin-top: 22px; }
  .modal section h3 { font-family: 'Caveat', cursive; font-size: 28px; color: var(--olive); margin: 0 0 10px; transform: rotate(-1deg); display: inline-block; }
  .ingredient-list, .steps-list { margin: 0; padding: 0; list-style: none; }
  .ingredient-list li { padding: 10px 0; border-bottom: 1px dashed rgba(42, 24, 16, 0.15); font-family: 'Fraunces', serif; font-size: 16px; color: var(--ink); display: flex; justify-content: space-between; gap: 12px; }
  .ingredient-list li:last-child { border-bottom: none; }
  .steps-list li { counter-increment: step; margin-bottom: 14px; padding-left: 48px; position: relative; font-size: 15px; line-height: 1.65; }
  .steps-list { counter-reset: step; }
  .steps-list li::before { content: counter(step); position: absolute; left: 0; top: -2px; width: 34px; height: 34px; background: var(--tomato); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Fraunces', serif; font-weight: 700; font-size: 16px; }
  .modal .tip { background: var(--cream); border-left: 4px solid var(--mustard); padding: 14px 18px; margin-top: 20px; border-radius: 0 12px 12px 0; font-style: italic; font-size: 14px; color: var(--ink-soft); }
  .modal .tip::before { content: 'Tip '; font-family: 'Caveat', cursive; font-size: 22px; color: var(--mustard); font-style: normal; font-weight: 700; display: block; margin-bottom: 2px; }
  .actions { position: sticky; bottom: 0; background: linear-gradient(to top, var(--paper) 70%, rgba(250, 243, 231, 0)); padding: 14px 24px 24px; display: flex; gap: 10px; }
  .btn { flex: 1; padding: 14px 16px; border-radius: 14px; border: none; font-family: 'Fraunces', serif; font-weight: 600; font-size: 15px; cursor: pointer; transition: transform 0.15s ease; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary { background: var(--tomato); color: white; box-shadow: 0 4px 14px rgba(200, 71, 42, 0.3); }
  .btn-secondary { background: var(--cream); color: var(--ink); border: 2px solid var(--ink); }
  .btn-danger { background: transparent; color: var(--tomato-dark); border: 2px solid rgba(154, 53, 32, 0.3); flex: 0 0 auto; padding: 14px 18px; }
  .btn:active { transform: scale(0.96); }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-family: 'Caveat', cursive; font-size: 22px; color: var(--olive); margin-bottom: 6px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px 14px; border: 2px solid rgba(42, 24, 16, 0.15); border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 15px; background: var(--cream); color: var(--ink); -webkit-appearance: none; appearance: none; }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--tomato); }
  .form-helper { font-size: 12px; color: var(--ink-soft); margin-top: 4px; font-style: italic; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-modal-header { padding: 24px 24px 0; position: relative; }
  .form-modal-header .modal-handle { position: relative; top: 0; left: 0; transform: none; margin: 0 auto 16px; background: var(--ink-soft); opacity: 0.3; }
  .form-modal-header h2 { color: var(--ink); text-shadow: none; font-size: 30px; margin: 0 40px 4px 0; }
  .form-modal-header .modal-meta { margin: 0 0 4px; }
  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--ink); color: var(--paper); padding: 14px 22px; border-radius: 14px; font-family: 'Fraunces', serif; font-size: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 300; opacity: 0; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); max-width: 90%; text-align: center; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .empty-state { padding: 40px 24px; text-align: center; color: var(--ink-soft); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h3 { font-family: 'Caveat', cursive; font-size: 30px; color: var(--ink); margin: 0 0 6px; }
  .empty-state p { font-size: 14px; margin: 0; }
  .loading { padding: 40px; text-align: center; color: var(--ink-soft); font-family: 'Caveat', cursive; font-size: 24px; }
</style>
</head>
<body>

<div class="header">
  <h1>Mijn Kookboek</h1>
  <div class="subtitle">— gezond eten voor het hele gezin —</div>
  <div class="underline"></div>
</div>

<div class="nav-section">
  <div class="nav-label">Dagtype</div>
  <div class="pills" id="dayPills"></div>
  <div class="nav-label" style="margin-top: 12px;">Maaltijd</div>
  <div class="pills" id="mealPills"></div>
</div>

<div class="recipes" id="recipes">
  <div class="loading">Even de recepten ophalen...</div>
</div>

<button class="add-btn" onclick="openAddRecipe()" aria-label="Recept toevoegen">+</button>

<div class="modal-overlay" id="recipeModal" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <div class="modal-hero" id="modalHero">
      <div class="modal-handle"></div>
      <button class="modal-close" onclick="closeModal()" aria-label="Sluiten">×</button>
      <div class="modal-hero-content">
        <div class="badge-row" id="modalBadges"></div>
        <h2 id="modalTitle"></h2>
      </div>
    </div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-content" id="modalContent"></div>
    <div class="actions" id="modalActions"></div>
  </div>
</div>

<div class="modal-overlay" id="addModal" onclick="if(event.target===this) closeAddModal()">
  <div class="modal">
    <div class="form-modal-header">
      <div class="modal-handle"></div>
      <button class="modal-close" onclick="closeAddModal()" aria-label="Sluiten" style="background:var(--cream);">×</button>
      <div class="modal-meta">Nieuw recept</div>
      <h2>Voeg een recept toe</h2>
    </div>
    <div class="modal-content">
      <div class="form-group">
        <label>Naam van het recept</label>
        <input type="text" id="newTitle" placeholder="bijv. Marokkaanse linzensoep">
      </div>
      <div class="form-group">
        <label>Korte beschrijving</label>
        <input type="text" id="newDesc" placeholder="bijv. Warm en hartverwarmend voor koude dagen">
      </div>
      <div class="form-group">
        <label>Foto-zoekterm (Engels werkt het beste)</label>
        <input type="text" id="newImageQuery" placeholder="bijv. lentil soup">
        <div class="form-helper">We zoeken een mooie foto op basis van deze term.</div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Maaltijdtype</label>
          <select id="newMealType">
            <option value="ontbijt">Ontbijt</option>
            <option value="snack">Tussendoor</option>
            <option value="lunch">Lunch</option>
            <option value="diner" selected>Diner</option>
          </select>
        </div>
        <div class="form-group">
          <label>Dagtype</label>
          <select id="newDayType">
            <option value="all">Alle dagen</option>
            <option value="fitness">Fitness</option>
            <option value="wielren">Wielrennen</option>
            <option value="rust">Rust</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Tijd (minuten)</label>
        <input type="number" id="newTime" placeholder="30" min="1">
      </div>
      <div class="form-group">
        <label>Porties</label>
        <input type="number" id="newServings" value="4" min="1">
      </div>
      <div class="form-group">
        <label>Ingrediënten</label>
        <textarea id="newIngredients" rows="6" placeholder="Eén per regel"></textarea>
        <div class="form-helper">Eén ingrediënt per regel.</div>
      </div>
      <div class="form-group">
        <label>Stappen</label>
        <textarea id="newSteps" rows="6" placeholder="Eén stap per regel"></textarea>
        <div class="form-helper">Eén stap per regel.</div>
      </div>
      <div class="form-group">
        <label>Tip (optioneel)</label>
        <textarea id="newTip" rows="2" placeholder="Een handige tip of variatie"></textarea>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-secondary" onclick="closeAddModal()">Annuleren</button>
      <button class="btn btn-primary" onclick="saveNewRecipe()">Opslaan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Emoji mapping per recept-ID, met fallback per maaltijdtype
const recipeEmojis = {
  // Ontbijten
  'ontbijt-1': '🫐', 'ontbijt-2': '🍌', 'ontbijt-3': '🥣', 'ontbijt-4': '🍳',
  'ontbijt-5': '🥭', 'ontbijt-6': '🥑', 'ontbijt-7': '🥬', 'ontbijt-8': '🥞',
  'ontbijt-9': '🍎', 'ontbijt-10': '🍄', 'ontbijt-11': '🍑', 'ontbijt-12': '🥞',
  'ontbijt-13': '🍯', 'ontbijt-14': '🐟', 'ontbijt-15': '🍅',
  // Snacks
  'snack-1': '🫐', 'snack-2': '🥕', 'snack-3': '🥤', 'snack-4': '🌰',
  'snack-5': '🥚', 'snack-6': '🍎', 'snack-7': '🍫', 'snack-8': '🫛',
  'snack-9': '🥜', 'snack-10': '🍦', 'snack-11': '🧀', 'snack-12': '🧁',
  // Lunches
  'lunch-1': '🌯', 'lunch-2': '🐟', 'lunch-3': '🌯', 'lunch-4': '🥗',
  'lunch-5': '🧀', 'lunch-6': '🍲', 'lunch-7': '🥯', 'lunch-8': '🍠',
  'lunch-9': '🎃', 'lunch-10': '🍅', 'lunch-11': '🐟', 'lunch-12': '🐟',
  'lunch-13': '🥭', 'lunch-14': '🌯', 'lunch-15': '🥦',
  // Diners
  'diner-1': '🍟', 'diner-2': '🐟', 'diner-3': '🍛', 'diner-4': '🥢',
  'diner-5': '🍲', 'diner-6': '🍗', 'diner-7': '🍝', 'diner-8': '🥔',
  'diner-9': '🌮', 'diner-10': '🍗', 'diner-11': '🐟', 'diner-12': '🥙',
  'diner-13': '🎃', 'diner-14': '🐟', 'diner-15': '🌶️', 'diner-16': '🍆',
  'diner-17': '🍢', 'diner-18': '🍕'
};

const mealTypeEmojis = {
  'ontbijt': '🥣', 'snack': '🍎', 'lunch': '🥗', 'diner': '🍽️'
};

const mealTypeColors = {
  'ontbijt': 'linear-gradient(135deg, #fde68a 0%, #fbbf24 100%)',
  'snack': 'linear-gradient(135deg, #c7e0b4 0%, #84a76b 100%)',
  'lunch': 'linear-gradient(135deg, #fcc89e 0%, #f08a4b 100%)',
  'diner': 'linear-gradient(135deg, #f4a07b 0%, #c8472a 100%)'
};

function getRecipeEmoji(recipeId, mealType) {
  return recipeEmojis[recipeId] || mealTypeEmojis[mealType] || '🍽️';
}

function getMealTypeGradient(mealType) {
  return mealTypeColors[mealType] || 'linear-gradient(135deg, #fef3c7 0%, #f59e0b 100%)';
}

const defaultRecipes = [
  // ============ ONTBIJTEN (15) ============
  { id: 'ontbijt-1', title: 'Griekse yoghurt met bessen, chia & amandelen', desc: 'Jouw vaste basis, vol eiwitten en omega-3.', image: 'greek yogurt berries almonds', mealType: 'ontbijt', dayType: 'all', time: 5, servings: 1,
    ingredients: ['200g Griekse yoghurt 10%', '1 el chiazaad', '15g amandelen, gehakt', 'handje blauwe bessen', '1 tl honing (optioneel)'],
    steps: ['Schep de yoghurt in een kom.', 'Voeg chiazaad, amandelen en bessen toe.', 'Druppel eventueel honing erover en serveer.'],
    tip: 'Maak de avond ervoor voor extra romige textuur — chiazaad zwelt op in de yoghurt.' },
  { id: 'ontbijt-2', title: 'Griekse yoghurt met banaan, walnoten & kaneel', desc: 'Warm-zoete variant zonder toegevoegde suiker.', image: 'yogurt banana walnut', mealType: 'ontbijt', dayType: 'all', time: 5, servings: 1,
    ingredients: ['200g Griekse yoghurt 10%', '1 el chiazaad', '1 banaan, in plakjes', '15g walnoten, gebroken', 'snufje kaneel'],
    steps: ['Yoghurt in een kom doen.', 'Banaan en walnoten erop verdelen.', 'Bestrooien met chiazaad en kaneel.'],
    tip: 'Op trainingsdagen: voeg een schep havervlokken toe voor extra koolhydraten.' },
  { id: 'ontbijt-3', title: 'Havermout met amandelmelk & chiazaad', desc: 'Warm ontbijt voor koude dagen, vol vezels.', image: 'oatmeal porridge bowl', mealType: 'ontbijt', dayType: 'wielren', time: 10, servings: 1,
    ingredients: ['60g havervlokken', '250ml ongezoete amandelmelk', '1 el chiazaad', '15g amandelen, gehakt', 'handje rood fruit', 'snufje kaneel'],

let recipes = [];
let activeDayType = 'all';
let activeMealType = 'all';

const dayTypes = [
  { id: 'all', label: 'Alles', class: '' },
  { id: 'fitness', label: 'Fitness', class: 'day-fitness' },
  { id: 'wielren', label: 'Wielrennen', class: 'day-wielren' },
  { id: 'rust', label: 'Rust', class: 'day-rust' }
];

const mealTypes = [
  { id: 'all', label: 'Alles' },
  { id: 'ontbijt', label: 'Ontbijt' },
  { id: 'snack', label: 'Tussendoor' },
  { id: 'lunch', label: 'Lunch' },
  { id: 'diner', label: 'Diner' }
];

function loadRecipes() {
  try {
    const stored = localStorage.getItem('custom_recipes');
    const customRecipes = stored ? JSON.parse(stored) : [];
    recipes = [...defaultRecipes, ...customRecipes];
  } catch (e) {
    console.warn('Kon eigen recepten niet laden, gebruik standaard:', e);
    recipes = [...defaultRecipes];
  }
  renderRecipes();
}

function saveCustomRecipes() {
  const customRecipes = recipes.filter(r => r.custom);
  try {
    localStorage.setItem('custom_recipes', JSON.stringify(customRecipes));
  } catch (e) {
    console.error('Opslag mislukt:', e);
    showToast('Opslag mislukt — probeer opnieuw');
  }
}

function renderPills() {
  const dayPills = document.getElementById('dayPills');
  dayPills.innerHTML = dayTypes.map(d => 
    `<button class="pill ${d.class} ${activeDayType === d.id ? 'active' : ''}" onclick="setDay('${d.id}')">${d.label}</button>`
  ).join('');
  const mealPills = document.getElementById('mealPills');
  mealPills.innerHTML = mealTypes.map(m => 
    `<button class="pill ${activeMealType === m.id ? 'active' : ''}" onclick="setMeal('${m.id}')">${m.label}</button>`
  ).join('');
}

function setDay(id) { activeDayType = id; renderPills(); renderRecipes(); }
function setMeal(id) { activeMealType = id; renderPills(); renderRecipes(); }

function renderRecipes() {
  const container = document.getElementById('recipes');
  const filtered = recipes.filter(r => {
    const dayOk = activeDayType === 'all' || r.dayType === 'all' || r.dayType === activeDayType;
    const mealOk = activeMealType === 'all' || r.mealType === activeMealType;
    return dayOk && mealOk;
  });
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🍽️</div><h3>Geen recepten gevonden</h3><p>Probeer een andere filter, of voeg een nieuw recept toe!</p></div>`;
    return;
  }
  container.innerHTML = filtered.map(r => {
    const dayTag = r.dayType !== 'all' ? `<span class="meta-tag ${r.dayType}">${dayTypeLabel(r.dayType)}</span>` : '';
    const mealTag = `<span class="meta-tag">${mealTypeLabel(r.mealType)}</span>`;
    const emoji = getRecipeEmoji(r.id, r.mealType);
    const gradient = getMealTypeGradient(r.mealType);
    return `
      <div class="recipe-card type-${r.mealType}" onclick="openRecipe('${r.id}')">
        <div class="card-image" style="background: ${gradient}">
          <div class="recipe-emoji">${emoji}</div>
          <div class="badge-row">
            ${mealTag}${dayTag}
            ${r.custom ? '<span class="meta-tag" style="background:var(--mustard);color:white;">eigen</span>' : ''}
          </div>
        </div>
        <div class="card-body">
          <h3>${escapeHtml(r.title)}</h3>
          <p class="desc">${escapeHtml(r.desc || '')}</p>
          <div class="footer">
            <span class="time">${r.time} min</span>
            <span>voor ${r.servings} ${r.servings === 1 ? 'persoon' : 'personen'}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

function dayTypeLabel(d) { return { fitness: 'Fitness', wielren: 'Wielrennen', rust: 'Rust' }[d] || d; }
function mealTypeLabel(m) { return { ontbijt: 'Ontbijt', snack: 'Tussendoor', lunch: 'Lunch', diner: 'Diner' }[m] || m; }
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function openRecipe(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  document.getElementById('modalTitle').textContent = r.title;
  document.getElementById('modalMeta').textContent = `${mealTypeLabel(r.mealType)} • ${r.time} min • ${r.servings} ${r.servings === 1 ? 'persoon' : 'personen'}`;
  const dayTag = r.dayType !== 'all' ? `<span class="meta-tag ${r.dayType}">${dayTypeLabel(r.dayType)}</span>` : '';
  const mealTag = `<span class="meta-tag">${mealTypeLabel(r.mealType)}</span>`;
  document.getElementById('modalBadges').innerHTML = mealTag + dayTag;
  const emoji = getRecipeEmoji(r.id, r.mealType);
  const gradient = getMealTypeGradient(r.mealType);
  const modalHero = document.getElementById('modalHero');
  modalHero.style.background = gradient;
  modalHero.style.backgroundImage = '';
  // Plaats emoji als groot icoon in de hero
  let heroEmoji = document.getElementById('modalHeroEmoji');
  if (!heroEmoji) {
    heroEmoji = document.createElement('div');
    heroEmoji.id = 'modalHeroEmoji';
    heroEmoji.className = 'modal-hero-emoji';
    modalHero.insertBefore(heroEmoji, modalHero.firstChild);
  }
  heroEmoji.textContent = emoji;
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    ${r.desc ? `<p style="font-family:'Fraunces',serif;font-style:italic;font-size:16px;color:var(--ink-soft);margin:10px 0 0;">${escapeHtml(r.desc)}</p>` : ''}
    <section><h3>Ingrediënten</h3><ul class="ingredient-list">${r.ingredients.map(ing => `<li><span>${escapeHtml(ing)}</span></li>`).join('')}</ul></section>
    <section><h3>Bereiding</h3><ol class="steps-list">${r.steps.map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ol></section>
    ${r.tip ? `<div class="tip">${escapeHtml(r.tip)}</div>` : ''}
  `;
  const actions = document.getElementById('modalActions');
  actions.innerHTML = `
    <button class="btn btn-primary" onclick="copyShopping('${r.id}')">📋 Boodschappen kopiëren</button>
    ${r.custom ? `<button class="btn btn-danger" onclick="deleteRecipe('${r.id}')">Verwijderen</button>` : ''}
  `;
  document.getElementById('recipeModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('recipeModal').classList.remove('active');
  document.body.style.overflow = '';
}

async function copyShopping(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  const text = r.ingredients.join('\n');
  try {
    await navigator.clipboard.writeText(text);
    showToast('Gekopieerd! Open je Herinneringen-app en plak het lijstje.');
    setTimeout(() => {
      if (confirm('Wil je de Herinneringen-app openen?')) {
        window.location.href = 'x-apple-reminderkit://';
      }
    }, 600);
  } catch (e) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    showToast('Gekopieerd! Plak in je Herinneringen-app.');
  }
}

function openAddRecipe() {
  document.getElementById('addModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('active');
  document.body.style.overflow = '';
  clearAddForm();
}

function clearAddForm() {
  ['newTitle','newDesc','newImageQuery','newTime','newIngredients','newSteps','newTip'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('newServings').value = '4';
  document.getElementById('newMealType').value = 'diner';
  document.getElementById('newDayType').value = 'all';
}

async function saveNewRecipe() {
  const title = document.getElementById('newTitle').value.trim();
  const ingredientsText = document.getElementById('newIngredients').value.trim();
  const stepsText = document.getElementById('newSteps').value.trim();
  if (!title) { showToast('Vul een naam in voor het recept'); return; }
  if (!ingredientsText) { showToast('Voeg ten minste één ingrediënt toe'); return; }
  if (!stepsText) { showToast('Voeg ten minste één stap toe'); return; }
  const imageQuery = document.getElementById('newImageQuery').value.trim() || title;
  const newRecipe = {
    id: 'custom-' + Date.now(),
    custom: true,
    title,
    desc: document.getElementById('newDesc').value.trim(),
    image: imageQuery,
    mealType: document.getElementById('newMealType').value,
    dayType: document.getElementById('newDayType').value,
    time: parseInt(document.getElementById('newTime').value) || 30,
    servings: parseInt(document.getElementById('newServings').value) || 4,
    ingredients: ingredientsText.split('\n').map(s => s.trim()).filter(Boolean),
    steps: stepsText.split('\n').map(s => s.trim()).filter(Boolean),
    tip: document.getElementById('newTip').value.trim()
  };
  recipes.push(newRecipe);
  await saveCustomRecipes();
  closeAddModal();
  renderRecipes();
  showToast('Recept opgeslagen!');
}

async function deleteRecipe(id) {
  if (!confirm('Weet je zeker dat je dit recept wilt verwijderen?')) return;
  recipes = recipes.filter(r => r.id !== id);
  await saveCustomRecipes();
  closeModal();
  renderRecipes();
  showToast('Recept verwijderd');
}

let toastTimeout;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
}

renderPills();
loadRecipes();
</script>

</body>
